<!DOCTYPE html> <!-- serve para indicar a programação utilizada-->
<html lang="pt-br"> <!--abertura que delimita o documento, todas as tags devem ficar dentro desse espaço.-->
<head> <!-- define o cabeçalho do documento, as informações colocadas dentro desse limite, não aparecem no navegador, mas contém instruçoẽs sobre os conteúdo. Detro dessa tag podemos colocar folhas de estilo e script. -->
    <meta charset="UTF-8"> <!-- especifica qual conjunto de caracteres (character set ou charset) será usado para renderizar(converter o código em um arquivo) o texto da página. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- fornecer os metadados sobre sua página.-->
    <title>portifólio</title> <!-- é o título do seu documento.-->
</head> <!-- fechamento da tag do cabeçalho.-->
<body> <!-- abertura da tag, marcando o espaço no qual deve estar contido o conteúdo visual da página. As demais tags que representam texto, botões, etc. Devem ser adicionadas nesse intervalo.-->
    
</body> <!-- fechamento da tag do corpo do projeto.-->
</html> <!--fechamento do documento -->
